<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSJ Reader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            background: #0a0a0a;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }

        .toolbar-brand {
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            white-space: nowrap;
            font-family: Georgia, serif;
        }

        .toolbar-brand span {
            color: #4a90d9;
        }

        .url-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .url-input {
            flex: 1;
            padding: 7px 12px;
            border: 1px solid #333;
            border-radius: 5px;
            font-size: 13px;
            background: #1a1a1a;
            color: #e0e0e0;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .url-input:focus {
            border-color: #4a90d9;
            box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.2);
        }

        .url-input::placeholder {
            color: #666;
        }

        .btn {
            padding: 7px 14px;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-go {
            background: #4a90d9;
            color: white;
        }

        .btn-go:hover {
            background: #357abd;
        }

        .btn-home {
            background: #2a2a2a;
            color: #ccc;
            border: 1px solid #444;
        }

        .btn-home:hover {
            background: #3a3a3a;
            color: white;
        }

        .btn-newtab {
            background: #28a745;
            color: white;
        }

        .btn-newtab:hover {
            background: #218838;
        }

        .content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .content iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.4s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #e0e0e0;
            border-top-color: #0a0a0a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            margin-top: 14px;
            font-size: 14px;
            color: #666;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-bar {
            background: #1a1a1a;
            border-top: 1px solid #333;
            padding: 5px 16px;
            font-size: 11px;
            color: #888;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-bar .hint {
            color: #aaa;
        }

        .status-bar .hint strong {
            color: #4a90d9;
        }

        @media (max-width: 768px) {
            .toolbar {
                flex-wrap: wrap;
                padding: 6px 10px;
                gap: 6px;
            }

            .toolbar-brand {
                font-size: 14px;
            }

            .url-container {
                order: 3;
                max-width: 100%;
                width: 100%;
            }

            .url-input {
                font-size: 12px;
                padding: 6px 10px;
            }

            .btn {
                padding: 6px 10px;
                font-size: 11px;
            }

            .status-bar {
                flex-wrap: wrap;
                gap: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="toolbar-brand">WSJ <span>Reader</span></div>
        <div class="url-container">
            <input type="text" class="url-input" id="urlInput" 
                   placeholder="Paste any WSJ article URL here..."
                   value="https://www.wsj.com">
            <button class="btn btn-go" id="btnGo">Read</button>
            <button class="btn btn-newtab" id="btnNewTab">↗ New Tab</button>
            <button class="btn btn-home" id="btnHome">⌂ Home</button>
        </div>
    </div>

    <div class="content">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading WSJ via archive.is...</div>
        </div>
        <iframe id="mainFrame" 
                referrerpolicy="no-referrer">
        </iframe>
    </div>

    <div class="status-bar">
        <span id="statusText">Loading...</span>
        <span class="hint">💡 <strong>Tip:</strong> Right-click any headline → Copy Link → Paste above → Click Read</span>
    </div>

    <script>
        const WSJ_HOME = 'https://www.wsj.com';
        const ARCHIVE_PREFIX = 'https://archive.is/newest/';
        
        const urlInput = document.getElementById('urlInput');
        const btnGo = document.getElementById('btnGo');
        const btnNewTab = document.getElementById('btnNewTab');
        const btnHome = document.getElementById('btnHome');
        const mainFrame = document.getElementById('mainFrame');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const statusText = document.getElementById('statusText');

        function getArchiveUrl(url) {
            url = url.trim();
            // Already an archive URL
            if (url.startsWith('https://archive.is/') || url.startsWith('https://archive.ph/') ||
                url.startsWith('http://archive.is/') || url.startsWith('http://archive.ph/')) {
                return url;
            }
            // Add protocol if missing
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            return ARCHIVE_PREFIX + url;
        }

        function loadUrl(url) {
            url = url.trim();
            if (!url) return;
            
            const archiveUrl = getArchiveUrl(url);
            
            // Show loading
            loadingOverlay.classList.remove('hidden');
            statusText.textContent = 'Loading: ' + url;
            
            // Update URL input (show the original URL, not archive URL)
            if (!url.startsWith('https://archive.')) {
                urlInput.value = url;
            }
            
            // Load in iframe
            mainFrame.src = archiveUrl;
        }

        // Detect iframe load
        mainFrame.addEventListener('load', function() {
            setTimeout(() => {
                loadingOverlay.classList.add('hidden');
                statusText.textContent = 'Loaded: ' + urlInput.value;
            }, 500);
        });

        // Also hide loading after timeout (in case load event doesn't fire properly)
        function hideLoadingAfterTimeout() {
            setTimeout(() => {
                loadingOverlay.classList.add('hidden');
            }, 10000);
        }

        // Read button
        btnGo.addEventListener('click', function() {
            const url = urlInput.value.trim();
            if (url) {
                loadUrl(url);
                hideLoadingAfterTimeout();
            }
        });

        // New Tab button - opens in new tab directly
        btnNewTab.addEventListener('click', function() {
            const url = urlInput.value.trim();
            if (url) {
                window.open(getArchiveUrl(url), '_blank');
            }
        });

        // Home button
        btnHome.addEventListener('click', function() {
            urlInput.value = WSJ_HOME;
            loadUrl(WSJ_HOME);
            hideLoadingAfterTimeout();
        });

        // Enter key
        urlInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const url = urlInput.value.trim();
                if (url) {
                    loadUrl(url);
                    hideLoadingAfterTimeout();
                }
            }
        });

        // Select all on focus
        urlInput.addEventListener('focus', function() {
            this.select();
        });

        // Auto-load WSJ homepage on page open
        loadUrl(WSJ_HOME);
        hideLoadingAfterTimeout();
    </script>
</body>
</html>
